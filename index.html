<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivicPulse</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      // Gracefully silence benign Vite HMR WebSocket failures arising from proxy/sandbox setups
      (function() {
        if (typeof window === 'undefined') return;
        
        // Prevent unhandled rejections from bubbling up
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason ? (event.reason.message || String(event.reason)) : '';
          if (
            reason.includes('WebSocket') || 
            reason.includes('websocket') || 
            reason.includes('closed without opened') ||
            reason.includes('HMR')
          ) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);

        // Prevent general error bubble for WebSockets
        window.addEventListener('error', function(event) {
          const message = event.message || '';
          if (
            message.includes('WebSocket') || 
            message.includes('websocket') || 
            message.includes('closed without opened') ||
            message.includes('HMR')
          ) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);

        // Subclass original WebSocket to suppress internal connection errors in background
        const OriginalWS = window.WebSocket;
        if (OriginalWS) {
          const WrappedWS = function(url, protocols) {
            try {
              const ws = protocols ? new OriginalWS(url, protocols) : new OriginalWS(url);
              ws.addEventListener('error', function(e) {
                // Keep errors internal to the WebSocket client, preventing window-level errors
                e.preventDefault();
                e.stopPropagation();
              });
              return ws;
            } catch (err) {
              // Return a stub if construction fails altogether
              const stub = {
                addEventListener: function() {},
                removeEventListener: function() {},
                close: function() {},
                send: function() {},
                readyState: 3 // CLOSED
              };
              return stub;
            }
          };
          WrappedWS.prototype = OriginalWS.prototype;
          for (const prop in OriginalWS) {
            if (Object.prototype.hasOwnProperty.call(OriginalWS, prop)) {
              WrappedWS[prop] = OriginalWS[prop];
            }
          }
          window.WebSocket = WrappedWS;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
